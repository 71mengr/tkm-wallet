name: Build TKM Wallet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            output: TKM-Wallet-Setup-${{ github.ref_name }}.exe
          - os: ubuntu-latest
            platform: linux
            output: TKM-Wallet-${{ github.ref_name }}.AppImage
          - os: macos-latest
            platform: mac
            output: TKM-Wallet-${{ github.ref_name }}.dmg
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build ${{ matrix.platform }}
        run: npm run dist:${{ matrix.platform }}
      
      - name: Rename output
        run: |
          cd dist
          # Find and rename the built file
          if [ "${{ matrix.platform }}" = "windows" ]; then
            mv *.exe ${{ matrix.output }}
          elif [ "${{ matrix.platform }}" = "linux" ]; then
            mv *.AppImage ${{ matrix.output }}
          else
            mv *.dmg ${{ matrix.output }}
          fi
        shell: bash
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tkm-wallet-${{ matrix.platform }}-${{ github.ref_name }}
          path: dist/${{ matrix.output }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/tkm-wallet-windows-*/
            artifacts/tkm-wallet-linux-*/
            artifacts/tkm-wallet-mac-*/
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
